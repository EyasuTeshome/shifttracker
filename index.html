<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shift Tracker</title>
<meta name="theme-color" content="#4F46E5">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --accent:#4F46E5;--accent-2:#6366F1;--accent-ink:#fff;
  --accent-soft:#EEF2FF;--accent-soft-strong:#E0E7FF;
  --bg:#F5F5F7;--bg-elev:#FFFFFF;--bg-soft:#ECECF0;
  --surface:#FFFFFF;--surface-2:#F9F9FB;
  --ink:#0B0B12;--ink-2:#2A2A33;--ink-3:#5C5C66;--ink-4:#94949E;--ink-5:#C2C2CA;
  --line:rgba(11,11,18,0.08);--line-strong:rgba(11,11,18,0.12);
  --shadow-sm:0 1px 2px rgba(11,11,18,0.04);
  --shadow:0 2px 6px rgba(11,11,18,0.05),0 1px 2px rgba(11,11,18,0.04);
  --shadow-md:0 6px 16px rgba(11,11,18,0.08),0 2px 4px rgba(11,11,18,0.04);
  --shadow-lg:0 16px 40px rgba(11,11,18,0.16),0 4px 12px rgba(11,11,18,0.06);
  --shadow-fab:0 8px 24px rgba(79,70,229,0.35),0 2px 6px rgba(79,70,229,0.2);
  --in-progress:#F59E0B;--in-progress-bg:rgba(245,158,11,0.12);
  --done:#10B981;--done-bg:rgba(16,185,129,0.12);
  --danger:#EF4444;--danger-bg:rgba(239,68,68,0.10);
  --todo:#94949E;
  --radius:14px;--radius-sm:10px;--radius-lg:22px;--radius-xl:28px;
  --nav-h:72px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--app-w:640px;
  --tr:0.18s ease;
}
[data-theme="dark"] {
  --bg:#0A0A0F;--bg-elev:#15151E;--bg-soft:#15151E;--surface:#15151E;--surface-2:#1B1B26;
  --ink:#F4F4F8;--ink-2:#DCDCE4;--ink-3:#9D9DA8;--ink-4:#6B6B76;--ink-5:#3F3F48;
  --line:rgba(255,255,255,0.06);--line-strong:rgba(255,255,255,0.12);
  --accent-soft:rgba(99,102,241,0.14);--accent-soft-strong:rgba(99,102,241,0.22);
  --shadow-sm:0 1px 0 rgba(255,255,255,0.02);--shadow:0 4px 12px rgba(0,0,0,0.3);
  --shadow-md:0 8px 24px rgba(0,0,0,0.4);--shadow-lg:0 24px 48px rgba(0,0,0,0.6);
  --in-progress-bg:rgba(245,158,11,0.16);--done-bg:rgba(16,185,129,0.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
input,textarea,select,button{font-family:inherit}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--accent);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
#splash.hide{opacity:0;pointer-events:none}
#splash svg{width:56px;height:56px;fill:#fff}

/* AUTH */
#authScreen{position:fixed;inset:0;background:linear-gradient(145deg,#4F46E5 0%,#7C3AED 100%);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;padding-top:calc(20px + var(--safe-t))}
.auth-box{background:var(--surface);border-radius:var(--radius-xl);padding:36px 28px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .logo-icon{width:56px;height:56px;background:var(--accent-soft);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.auth-logo .logo-icon svg{width:28px;height:28px;fill:var(--accent)}
.auth-logo h1{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-0.4px}
.auth-logo p{font-size:13px;color:var(--ink-3);margin-top:4px}
.auth-tabs{display:flex;background:var(--bg-soft);border-radius:12px;padding:4px;margin-bottom:22px;gap:4px}
.auth-tab{flex:1;padding:9px;border:none;background:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink-4);transition:all var(--tr)}
.auth-tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
.auth-msg{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.auth-msg.error{background:var(--danger-bg);color:var(--danger);display:block}
.auth-msg.info{background:var(--accent-soft);color:var(--accent);display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-3);margin-bottom:6px;letter-spacing:0.2px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);font-size:15px;background:var(--surface-2);color:var(--ink);outline:none;transition:border-color var(--tr)}
.field input:focus{border-color:var(--accent)}

/* APP SHELL */
#app{display:none;min-height:100vh;max-width:var(--app-w);margin:0 auto;position:relative}
@media(min-width:700px){
  body{background:var(--bg-soft)}
  #app{margin:24px auto;min-height:calc(100vh - 48px);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-lg);border:1px solid var(--line)}
}

/* HEADER */
.app-header{background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:14px 16px;position:sticky;top:0;z-index:100;padding-top:calc(14px + var(--safe-t))}
[data-theme="dark"] .app-header{background:rgba(21,21,30,0.92)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-0.3px}
.header-actions{display:flex;align-items:center;gap:6px}
.hdr-btn{width:34px;height:34px;border:none;background:var(--surface-2);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:background var(--tr);flex-shrink:0}
.hdr-btn:hover{background:var(--bg-soft)}
.hdr-btn svg{width:18px;height:18px;fill:currentColor}

/* SHIFT BAR */
#shiftBar{display:none;background:linear-gradient(90deg,var(--accent),var(--accent-2));padding:10px 16px;align-items:center;gap:10px}
#shiftBar.active{display:flex}
.sbar-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.9);animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.sbar-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);flex:1}
.sbar-timer{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:#fff}
.sbar-btn{padding:5px 12px;border:1.5px solid rgba(255,255,255,0.5);border-radius:20px;background:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.sbar-btn:hover{background:rgba(255,255,255,0.15)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--app-w);background:var(--surface);border-top:1px solid var(--line);display:flex;z-index:100;padding-bottom:var(--safe-b)}
.nav-btn{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-4);font-size:11px;font-weight:500;transition:color var(--tr);position:relative}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;fill:currentColor}
.nav-dot{position:absolute;top:7px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:#F59E0B;border:2px solid var(--surface);display:none}
.nav-dot.show{display:block}

/* VIEWS */
.view{display:none;padding:16px 16px calc(var(--nav-h) + 20px + var(--safe-b));animation:viewIn 0.22s ease}
.view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border:1px solid var(--line)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-4);margin-bottom:12px}

/* TODAY HERO */
.hero-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:20px;margin-bottom:14px;border:1px solid var(--line);display:flex;align-items:center;gap:20px}
.hero-ring-wrap{position:relative;flex-shrink:0}
.hero-ring-wrap svg{width:88px;height:88px}
.ring-bg{fill:none;stroke:var(--bg-soft);stroke-width:7}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:7;stroke-linecap:round;stroke-dasharray:238.76;stroke-dashoffset:238.76;transition:stroke-dashoffset 0.6s ease;transform:rotate(-90deg);transform-origin:50% 50%}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--ink)}
.hero-info{flex:1;min-width:0}
.hero-greeting{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.hero-date{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-0.3px;margin-bottom:10px}
.hero-counts{display:flex;flex-wrap:wrap;gap:6px}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.pill-ip{background:var(--in-progress-bg);color:var(--in-progress)}
.pill-todo{background:var(--bg-soft);color:var(--ink-3)}
.pill-done{background:var(--done-bg);color:var(--done)}

/* CARRIED CARD */
.carried-card{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;cursor:pointer}
.carried-header{display:flex;align-items:center;gap:8px}
.carried-title{font-size:13px;font-weight:600;color:var(--in-progress);flex:1}
.carried-chevron{color:var(--in-progress);transition:transform var(--tr)}
.carried-card.open .carried-chevron{transform:rotate(180deg)}
.carried-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(245,158,11,0.2)}
.carried-card.open .carried-body{display:block}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.search-wrap{flex:1;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-4);pointer-events:none;fill:none;stroke:currentColor;stroke-width:2}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);font-size:14px;background:var(--surface);color:var(--ink);outline:none;transition:border-color var(--tr)}
.search-input:focus{border-color:var(--accent)}
.seg-ctrl{display:flex;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.seg-btn{padding:8px 10px;border:none;background:none;font-size:12px;font-weight:600;color:var(--ink-4);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.seg-btn.active{background:var(--accent);color:#fff}

/* TASK ITEMS */
.task-list{display:flex;flex-direction:column;gap:8px}
.task-item{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:12px 14px;border:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;position:relative;overflow:hidden;touch-action:pan-y}
.task-item.done-item{opacity:0.65}
.task-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--ink-5);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px}
.task-check.ip{background:var(--in-progress);border-color:var(--in-progress)}
.task-check.done{background:var(--done);border-color:var(--done)}
.task-check svg{width:14px;height:14px;fill:#fff;display:none}
.task-check.ip svg.sq{display:block}
.task-check.done svg.chk{display:block}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;word-break:break-word}
.task-item.done-item .task-title{text-decoration:line-through;color:var(--ink-4)}
.task-meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:5px}
.cat-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.from-chip{font-size:11px;color:var(--ink-4);background:var(--bg-soft);padding:2px 7px;border-radius:20px}
.ip-label{font-size:11px;color:var(--in-progress);font-weight:600}
.done-time{font-size:11px;color:var(--ink-4)}
.task-notes{font-size:12px;color:var(--ink-3);margin-top:4px;line-height:1.5}
.task-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.task-btn{width:28px;height:28px;border:none;background:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-4);transition:background var(--tr)}
.task-btn:hover{background:var(--bg-soft)}
.task-btn svg{width:15px;height:15px;fill:currentColor}
.swipe-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--done);display:flex;align-items:center;justify-content:center;transform:translateX(100%)}
.swipe-bg svg{width:22px;height:22px;fill:#fff}

/* ADD TASK */
.add-task-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:14px;border:1.5px dashed var(--line-strong);margin-top:8px}
.add-task-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-4);margin-bottom:10px}
.add-field{width:100%;padding:10px 12px;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);font-size:14px;background:var(--surface-2);color:var(--ink);outline:none;transition:border-color var(--tr);resize:none}
.add-field:focus{border-color:var(--accent)}
.add-field+.add-field{margin-top:8px}
.add-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.add-select{flex:1;padding:9px 12px;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);font-size:13px;background:var(--surface-2);color:var(--ink);outline:none;cursor:pointer;transition:border-color var(--tr)}
.add-select:focus{border-color:var(--accent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:transform 0.12s,opacity 0.12s;white-space:nowrap}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:var(--accent-ink);box-shadow:var(--shadow-fab)}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--line-strong);color:var(--ink)}
.btn-ghost{background:transparent;color:var(--accent);padding:8px 14px}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.btn svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}

/* FAB */
#fab{position:fixed;bottom:calc(var(--nav-h) + 16px + var(--safe-b));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);box-shadow:var(--shadow-fab);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:90;transition:transform 0.2s;color:#fff}
#fab:active{transform:scale(0.94)}
#fab svg{width:22px;height:22px;fill:currentColor}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-0.3px}
.cal-nav-btn{width:34px;height:34px;border:1px solid var(--line);background:var(--surface);border-radius:10px;cursor:pointer;color:var(--ink-3);display:flex;align-items:center;justify-content:center}
.cal-nav-btn svg{width:16px;height:16px;fill:currentColor}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:11px;font-weight:700;color:var(--ink-4);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:0.4px}
.cal-day{background:var(--surface);border-radius:10px;padding:6px 4px 5px;cursor:pointer;position:relative;border:1px solid var(--line);min-height:52px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color var(--tr)}
.cal-day:hover{border-color:var(--accent);background:var(--accent-soft)}
.cal-day.today{border-color:var(--accent);background:var(--accent-soft)}
.cal-day.other-month{opacity:0.35}
.cal-day-num{font-size:13px;font-weight:700;color:var(--ink)}
.cal-shift-dot{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.cal-bar-wrap{width:80%;height:3px;background:var(--bg-soft);border-radius:3px;overflow:hidden}
.cal-bar-fill{height:100%;background:var(--done);border-radius:3px}

/* SHIFT VIEW */
.shift-ring-wrap{display:flex;justify-content:center;margin:16px 0 8px}
.shift-ring-wrap svg{width:230px;height:230px}
.shift-ring-bg{fill:none;stroke:var(--bg-soft);stroke-width:12}
.shift-ring-fill{fill:none;stroke:var(--accent);stroke-width:12;stroke-linecap:round;stroke-dasharray:678.58;stroke-dashoffset:678.58;transition:stroke-dashoffset 1s ease;transform:rotate(-90deg);transform-origin:50% 50%}
.shift-center{text-align:center}
.shift-timer-text{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:var(--ink);letter-spacing:-1px;font-variant-numeric:tabular-nums}
.shift-ring-label{font-size:13px;color:var(--ink-4);margin-top:2px}
.shift-meta{display:flex;justify-content:center;gap:28px;margin:12px 0}
.smi{text-align:center}
.smi-val{font-size:22px;font-weight:800;color:var(--ink)}
.smi-lbl{font-size:11px;color:var(--ink-4);margin-top:1px}
.checkin-log{margin-top:12px}
.ci-entry{padding:10px 12px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid var(--line)}
.ci-time{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent)}
.ci-snap{font-size:13px;color:var(--ink-2);margin-top:2px}

/* HISTORY */
.streak-card{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;color:#fff}
.streak-num{font-size:42px;font-weight:800;letter-spacing:-1px;line-height:1}
.streak-lbl{font-size:13px;opacity:0.85;margin-bottom:14px}
.streak-bars{display:flex;gap:6px;align-items:flex-end;height:32px}
.streak-bar{flex:1;background:rgba(255,255,255,0.2);border-radius:3px;min-height:6px}
.streak-bar.filled{background:rgba(255,255,255,0.85);height:100%}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.stat-val{font-size:24px;font-weight:800;color:var(--ink)}
.stat-lbl{font-size:12px;color:var(--ink-4);margin-top:3px}
.hist-item{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid var(--line);display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}
.hist-date{text-align:center;flex-shrink:0;background:var(--accent-soft);border-radius:10px;padding:6px 10px;min-width:44px}
.hist-date-day{font-size:20px;font-weight:800;color:var(--accent);line-height:1}
.hist-date-mon{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.4px}
.hist-info{flex:1;min-width:0}
.hist-title{font-size:14px;font-weight:700;color:var(--ink)}
.hist-sub{font-size:12px;color:var(--ink-4);margin-top:2px}
.hring svg{width:42px;height:42px}
.hring-bg{fill:none;stroke:var(--bg-soft);stroke-width:4}
.hring-fill{fill:none;stroke:var(--done);stroke-width:4;stroke-linecap:round;stroke-dasharray:100.53}

/* SHEETS */
#sheetRoot{position:fixed;inset:0;z-index:300;pointer-events:none}
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.4);opacity:0;transition:opacity 0.3s;pointer-events:none}
.sheet-backdrop.show{opacity:1;pointer-events:all}
.sheet-panel{position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:var(--app-w);background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding-bottom:calc(20px + var(--safe-b));max-height:92vh;overflow-y:auto;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);box-shadow:var(--shadow-lg)}
.sheet-panel.show{transform:translateX(-50%) translateY(0)}
.sheet-grabber{width:36px;height:4px;background:var(--ink-5);border-radius:2px;margin:12px auto 20px}
.sheet-title{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-0.3px;padding:0 20px;margin-bottom:16px}
.sheet-body{padding:0 20px}
@media(min-width:700px){
  .sheet-panel{border-radius:var(--radius-xl);top:50%;bottom:auto;transform:translateX(-50%) translateY(calc(-50% + 40px));max-height:80vh}
  .sheet-panel.show{transform:translateX(-50%) translateY(-50%)}
}

/* TOAST */
#toastEl{position:fixed;bottom:calc(var(--nav-h) + 16px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg-elev);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;z-index:500;opacity:0;transition:all 0.25s;pointer-events:none;box-shadow:var(--shadow-md)}
#toastEl.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MISC */
.empty-state{text-align:center;padding:40px 20px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--ink-4)}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-4);margin:16px 0 8px}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color 0.15s,transform 0.15s;flex-shrink:0}
.color-swatch.selected{border-color:var(--ink);transform:scale(1.1)}
.swatch-row{display:flex;gap:8px;flex-wrap:wrap}
.template-item{background:var(--surface-2);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;border:1px solid var(--line)}
.tpl-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tpl-name{font-size:14px;font-weight:700;color:var(--ink);flex:1;min-width:80px}
.tpl-count{font-size:12px;color:var(--ink-4)}
.tpl-btn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--line-strong);background:none;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink-2);transition:all var(--tr)}
.tpl-btn:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.tpl-btn.red:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.tpl-tasks{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.tpl-tasks.open{display:block}
.tpl-task-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line)}
.tpl-task-row:last-child{border-bottom:none}
.tpl-task-title{flex:1;font-size:13px;color:var(--ink-2)}
.tpl-add-btn{padding:4px 10px;border:1.5px solid var(--accent);border-radius:20px;background:none;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer}
.cat-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.cat-item:last-child{border-bottom:none}
.cat-preview{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;flex:1}
.cat-del{padding:4px 10px;border:1.5px solid var(--danger);border-radius:20px;background:none;font-size:12px;font-weight:600;color:var(--danger);cursor:pointer}
.cat-del:disabled{opacity:.3;cursor:not-allowed}
.accent-swatches{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.accent-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s,border-color 0.15s}
.accent-swatch.selected{border-color:var(--ink);transform:scale(1.12)}
hr.divider{border:none;border-top:1px solid var(--line);margin:14px 0}
</style>
</head>

      <div class="cal-month" id="calMonthLabel"></div>
      <div style="display:flex;gap:6px">
        <button class="cal-nav-btn" onclick="calToday()"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zm-7-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg></button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBEFpdT1s1bRwKD5cnvwWaEmfvMHgDcXxo",
  authDomain: "shifttracker-9e16f.firebaseapp.com",
  projectId: "shifttracker-9e16f",
  storageBucket: "shifttracker-9e16f.firebasestorage.app",
  messagingSenderId: "812017027525",
  appId: "1:812017027525:web:5e256528d66b96827163ac"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const DEFAULT_CAT = {
  urgent:  {label:'⚡ Urgent',   bg:'#fef0ef',text:'#e74c3c',color:'#e74c3c'},
  routine: {label:'🔄 Routine',  bg:'#eef0fd',text:'#4361ee',color:'#4361ee'},
  followup:{label:'📋 Follow-up',bg:'#f5eef8',text:'#9b59b6',color:'#9b59b6'},
  deadline:{label:'🏁 Deadline', bg:'#eafaf1',text:'#2ecc71',color:'#2ecc71'},
};
const COLOR_PRESETS = [
  {bg:'#fef0ef',text:'#e74c3c',color:'#e74c3c'},{bg:'#eef0fd',text:'#4361ee',color:'#4361ee'},
  {bg:'#f5eef8',text:'#9b59b6',color:'#9b59b6'},{bg:'#eafaf1',text:'#2ecc71',color:'#2ecc71'},
  {bg:'#fff8e6',text:'#f39c12',color:'#f39c12'},{bg:'#e8f8f5',text:'#1abc9c',color:'#1abc9c'},
  {bg:'#fde8f5',text:'#e91e8c',color:'#e91e8c'},{bg:'#e8f4fd',text:'#3498db',color:'#3498db'},
];
const ACCENT_COLORS = ['#4F46E5','#0EA5E9','#10B981','#F59E0B','#EC4899','#7C3AED'];

let CAT = {...DEFAULT_CAT};
let customCategories = [];
let selectedColorIdx = 0;
let currentUser = null;
let appInitialized = false;
let currentFilter = 'all';
let currentView = 'today';
let calendarMonth = {year:new Date().getFullYear(), month:new Date().getMonth()};
let timerInterval = null;
let authMode = 'login';
let state = {tasks:[], currentShift:null, shiftHistory:[], templates:[]};

const pad = n => String(n).padStart(2,'0');
const todayStr = () => { const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };
const tomorrowStr = () => { const d=new Date(); d.setDate(d.getDate()+1); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };
function dateToStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function strToDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDate(s){ return strToDate(s).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtHMS(ms){ const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return pad(h)+':'+pad(m)+':'+pad(sc); }
function formatTime(ts){ return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function greeting(){ const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }

let _toastTimer;
function toast(msg,dur=2800){
  const el=document.getElementById('toastEl');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}

function toggleTheme(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  localStorage.setItem('st_theme',dark?'light':'dark');
}
function applyTheme(){ document.documentElement.setAttribute('data-theme',localStorage.getItem('st_theme')||'light'); }
function tintAccent(hex){
  document.documentElement.style.setProperty('--accent',hex);
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--accent-soft',`rgba(${r},${g},${b},0.1)`);
  document.documentElement.style.setProperty('--accent-soft-strong',`rgba(${r},${g},${b},0.2)`);
  document.documentElement.style.setProperty('--shadow-fab',`0 8px 24px rgba(${r},${g},${b},0.35),0 2px 6px rgba(${r},${g},${b},0.2)`);
  localStorage.setItem('st_accent',hex);
}
function applyAccent(){ const a=localStorage.getItem('st_accent'); if(a) tintAccent(a); }

function switchAuthTab(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(mode==='login'?0:1)===i));
  document.getElementById('authNameField').style.display=mode==='signup'?'block':'none';
  document.getElementById('authBtn').textContent=mode==='login'?'Login':'Create Account';
  showAuthMsg('','');
}
function showAuthMsg(msg,type){
  const el=document.getElementById('authMsg');
  el.textContent=msg; el.className='auth-msg'+(msg?' '+type:'');
  el.style.display=(msg&&type)?'block':'none';
}
async function submitAuth(){
  const email=document.getElementById('authEmail').value.trim();
  const pwd=document.getElementById('authPwd').value;
  if(!email||!pwd){showAuthMsg('Please enter email and password.','error');return;}
  const btn=document.getElementById('authBtn');
  btn.disabled=true; btn.textContent='…'; showAuthMsg('','');
  try{
    if(authMode==='login') await auth.signInWithEmailAndPassword(email,pwd);
    else{
      const cred=await auth.createUserWithEmailAndPassword(email,pwd);
      const name=document.getElementById('authName').value.trim();
      if(name) await cred.user.updateProfile({displayName:name});
    }
  }catch(e){
    showAuthMsg(e.message||'Authentication failed.','error');
    btn.disabled=false; btn.textContent=authMode==='login'?'Login':'Create Account';
  }
}
async function doSignOut(){
  try{ await auth.signOut(); }catch(e){}
  currentUser=null; appInitialized=false;
  state={tasks:[],currentShift:null,shiftHistory:[],templates:[]};
  stopTimer(); closeSheet();
  document.getElementById('app').style.display='none';
  document.getElementById('fab').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('authEmail').value='';
  document.getElementById('authPwd').value='';
  showAuthMsg('','');
}

function openSheet(title,bodyHtml,onMount){
  document.getElementById('sheetTitle').textContent=title;
  document.getElementById('sheetBody').innerHTML=bodyHtml;
  document.getElementById('sheetBackdrop').classList.add('show');
  setTimeout(()=>document.getElementById('sheetPanel').classList.add('show'),10);
  if(onMount) setTimeout(onMount,60);
}
function closeSheet(){
  document.getElementById('sheetPanel').classList.remove('show');
  document.getElementById('sheetBackdrop').classList.remove('show');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

function normTask(t){
  const status=t.status||(t.completed?'done':'todo');
  return{id:t.id,title:t.title,category:t.category||'routine',date:t.date,notes:t.notes||'',
    status,completed:status==='done',completedAt:t.completed_at?new Date(t.completed_at).getTime():null,createdAt:t.created_at||Date.now()};
}
function normShift(s){
  return{id:s.id,startTime:s.start_time,endTime:s.end_time,date:s.date,checkIns:s.check_ins||[],
    doneCount:s.done_count||0,missedCount:s.missed_count||0,pct:s.pct||0,duration:s.duration||0};
}

async function loadData(){
  const uid=currentUser.uid;
  const [tasksSnap,shiftsSnap,settingsDoc,tplSnap]=await Promise.all([
    db.collection('tasks').where('user_id','==',uid).get(),
    db.collection('shifts').where('user_id','==',uid).get(),
    db.collection('user_settings').doc(uid).get(),
    db.collection('templates').where('user_id','==',uid).get(),
  ]);
  if(settingsDoc.exists){ customCategories=settingsDoc.data().custom_categories||[]; rebuildCAT(); }
  state.tasks=tasksSnap.docs.map(d=>normTask({id:d.id,...d.data()})).sort((a,b)=>a.createdAt-b.createdAt);
  state.shiftHistory=shiftsSnap.docs.map(d=>normShift({id:d.id,...d.data()})).sort((a,b)=>b.startTime-a.startTime).slice(0,50);
  state.templates=tplSnap.docs.map(d=>({id:d.id,...d.data()}));
  const today=todayStr();
  const overdue=state.tasks.filter(t=>t.date<today&&t.status==='todo');

function attachSwipe(id){
  const el=document.getElementById('ti-'+id); if(!el) return;
  let sx=0,dx=0,on=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dx=0;on=true;},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!on) return; dx=e.touches[0].clientX-sx;
    if(dx>0) el.style.transform=`translateX(${Math.min(dx,100)}px)`;
  },{passive:true});
  el.addEventListener('touchend',()=>{
    on=false; el.style.transform='';
    if(dx>90){ const t=state.tasks.find(t=>t.id===id); if(t&&t.status!=='done') toggleTask(id); }
  });
}

function calNav(dir){
  calendarMonth.month+=dir;
  if(calendarMonth.month>11){calendarMonth.month=0;calendarMonth.year++;}
  if(calendarMonth.month<0){calendarMonth.month=11;calendarMonth.year--;}
  renderCalendar();

function calToday(){ const d=new Date(); calendarMonth={year:d.getFullYear(),month:d.getMonth()}; renderCalendar(); }
function renderCalendar(){
  const {year,month}=calendarMonth;
  const names=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent=names[month]+' '+year;
  const grid=document.getElementById('calGrid'); if(!grid) return;
  const today=todayStr(), shiftDates=new Set(state.shiftHistory.map(s=>s.date));
  const byDate={};
  state.tasks.forEach(t=>{ if(!byDate[t.date]) byDate[t.date]=[]; byDate[t.date].push(t); });
  let html='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{ html+=`<div class="cal-dow">${d}</div>`; });
  const first=new Date(year,month,1), lastDay=new Date(year,month+1,0).getDate();
  for(let i=0;i<first.getDay();i++) html+='<div class="cal-day other-month"></div>';
  for(let d=1;d<=lastDay;d++){
    const ds=year+'-'+pad(month+1)+'-'+pad(d);
    const tasks=byDate[ds]||[];
    const donePct=tasks.length?Math.round(tasks.filter(t=>t.status==='done').length/tasks.length*100):0;
    html+=`<div class="cal-day${ds===today?' today':''}" onclick="openDaySheet('${ds}')">
      ${shiftDates.has(ds)?'<span class="cal-shift-dot"></span>':''}
      <span class="cal-day-num">${d}</span>
      ${tasks.length?`<div class="cal-bar-wrap"><div class="cal-bar-fill" style="width:${donePct}%"></div></div>`:''}
    </div>`;
  }
  grid.innerHTML=html;
}
function openDaySheet(ds){

  let body=`<p style="font-size:13px;color:var(--ink-4);margin-bottom:14px">${label}</p>`;
  if(shift) body+=`<div style="background:var(--accent-soft);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--accent);font-weight:600">⏱ ${formatTime(shift.startTime)} – ${shift.endTime?formatTime(shift.endTime):'ongoing'} · ${shift.pct}% done</div>`;

async function endShift(){

  const done=tasks.filter(t=>t.status==='done').length;

  const endTime=Date.now(), duration=endTime-state.currentShift.startTime;

async function doRollover(){
  const today=todayStr(), tomorrow=tomorrowStr();
  const unfinished=state.tasks.filter(t=>t.date===today&&t.status!=='done');
  for(const t of unfinished){
    const ref=await db.collection('tasks').add({user_id:currentUser.uid,title:t.title,notes:t.notes,category:t.category,date:tomorrow,status:'todo',completed:false,completed_at:null,created_at:Date.now()});
    state.tasks.push(normTask({id:ref.id,user_id:currentUser.uid,title:t.title,notes:t.notes,category:t.category,date:tomorrow,status:'todo',completed:false,completed_at:null,created_at:Date.now()}));
  }
  toast(`${unfinished.length} tasks rolled to tomorrow`);
}
function startTimer(){ stopTimer(); timerInterval=setInterval(tick,1000); tick(); }
function stopTimer(){ clearInterval(timerInterval); timerInterval=null; }
function tick(){

  const td=document.getElementById('shiftTimerDisplay'); if(td) td.textContent=hms;
  const sb=document.getElementById('sbarTimer'); if(sb) sb.textContent=hms;
  const rf=document.getElementById('shiftRingFill'); if(rf) rf.style.strokeDashoffset=678.58*(1-Math.min(elapsed/(8*3600*1000),1));
}
function updateShiftMeta(){
  const today=todayStr(), tasks=state.tasks.filter(t=>t.date===today);
  const g=id=>document.getElementById(id);
  if(g('smDone')) g('smDone').textContent=tasks.filter(t=>t.status==='done').length;
  if(g('smIP')) g('smIP').textContent=tasks.filter(t=>t.status==='in-progress').length;
  if(g('smTodo')) g('smTodo').textContent=tasks.filter(t=>t.status==='todo').length;
}
function renderShiftView(){
  const active=!!state.currentShift;
  const rl=document.getElementById('shiftRingLabel'); if(rl) rl.textContent=active?'Active shift':'Ready to clock in';
  const br=document.getElementById('shiftBtnRow');
  if(br) br.innerHTML=!active
    ?`<button class="btn btn-primary btn-full" onclick="startShift()"><svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M8 5v14l11-7z"/></svg> Start Shift</button>`
    :`<button class="btn btn-outline" onclick="checkIn()"><svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> Check In</button>
      <button class="btn btn-danger" onclick="endShift()"><svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><rect x="6" y="6" width="12" height="12"/></svg> End Shift</button>`;
  const log=document.getElementById('checkInLog');
  if(log) log.innerHTML=active&&state.currentShift.checkIns.length
    ?'<div class="card-title" style="margin-bottom:8px">Check-in Log</div>'+state.currentShift.checkIns.slice().reverse().map(ci=>`<div class="ci-entry"><div class="ci-time">${formatTime(ci.ts)}</div><div class="ci-snap">${escHtml(ci.snapshot)}</div></div>`).join('')
    :'';
  updateShiftMeta();
}
function updateShiftBar(){ document.getElementById('shiftBar').classList.toggle('active',!!state.currentShift); }

function renderHistory(){
  const el=document.getElementById('historyContent'); if(!el) return;
  const shiftDates=new Set(state.shiftHistory.map(s=>s.date));
  let streak=0; const chk=new Date();
  for(let i=0;i<365;i++){
    if(shiftDates.has(dateToStr(chk))) streak++;
    else if(i>0) break;
    chk.setDate(chk.getDate()-1);
  }
  const last7=[]; for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); last7.push(dateToStr(d)); }
  const totalH=(state.shiftHistory.reduce((a,s)=>a+(s.duration||0),0)/3600000).toFixed(1);
  const avgPct=state.shiftHistory.length?Math.round(state.shiftHistory.reduce((a,s)=>a+s.pct,0)/state.shiftHistory.length):0;
  let html=`<div class="streak-card">
    <div class="streak-num">${streak}</div>
    <div class="streak-lbl">day streak 🔥</div>
    <div class="streak-bars">${last7.map(d=>`<div class="streak-bar${shiftDates.has(d)?' filled':''}"></div>`).join('')}</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${state.shiftHistory.length}</div><div class="stat-lbl">Total Shifts</div></div>
    <div class="stat-card"><div class="stat-val">${avgPct}%</div><div class="stat-lbl">Avg Completion</div></div>
    <div class="stat-card"><div class="stat-val">${totalH}h</div><div class="stat-lbl">Hours Logged</div></div>
    <div class="stat-card"><div class="stat-val">${state.tasks.filter(t=>t.status==='done').length}</div><div class="stat-lbl">Tasks Done</div></div>
  </div>`;
  if(!state.shiftHistory.length) html+='<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-title">No shifts yet</div><div class="empty-sub">Start your first shift to see history</div></div>';
  else{
    html+='<div class="section-label">Recent Shifts</div>';
    html+=state.shiftHistory.slice(0,20).map(s=>{
      const sd=strToDate(s.date), c=Math.round(s.pct/100*100.53);
      return`<div class="hist-item">
        <div class="hist-date"><div class="hist-date-day">${sd.getDate()}</div><div class="hist-date-mon">${sd.toLocaleDateString('en-US',{month:'short'})}</div></div>
        <div class="hist-info"><div class="hist-title">Shift · ${fmtHMS(s.duration||0)}</div><div class="hist-sub">${s.doneCount} done · ${s.missedCount} missed · ${s.checkIns.length} check-ins</div></div>
        <div class="hring"><svg viewBox="0 0 36 36"><circle class="hring-bg" cx="18" cy="18" r="16"/><circle class="hring-fill" cx="18" cy="18" r="16" stroke-dasharray="${c} 100.53" stroke-dashoffset="25.13" transform="rotate(-90 18 18)"/></svg></div>
      </div>`;
    }).join('');
  }
  el.innerHTML=html;
}

function openTemplatesSheet(){
  let body='';
  if(!state.templates.length) body='<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">No templates yet</div><div class="empty-sub">Save frequently used task groups as templates to quickly apply them at the start of any shift.</div></div>';
  else body=state.templates.map((tpl,i)=>`<div class="template-item">
    <div class="tpl-header">
      <div class="tpl-name">${escHtml(tpl.name)}</div>
      <span class="tpl-count">${(tpl.tasks||[]).length} tasks</span>
      <button class="tpl-btn" onclick="applyTemplate('${tpl.id}')">Apply All</button>
      <button class="tpl-btn" onclick="document.getElementById('tt${i}').classList.toggle('open')">▾</button>
      <button class="tpl-btn red" onclick="deleteTemplate('${tpl.id}')">✕</button>
    </div>
    <div class="tpl-tasks" id="tt${i}">
      ${(tpl.tasks||[]).map((t,j)=>`<div class="tpl-task-row">
        <span class="tpl-task-title">${escHtml(t.title)}</span>
        <span class="cat-chip" style="background:${(CAT[t.category]||CAT.routine).bg};color:${(CAT[t.category]||CAT.routine).text};font-size:10px">${escHtml((CAT[t.category]||CAT.routine).label)}</span>
        <button class="tpl-add-btn" onclick="applySingleTask('${tpl.id}',${j})">+ Add</button>
      </div>`).join('')}
    </div>
  </div>`).join('');
  body+=`<hr class="divider"><button class="btn btn-outline btn-full" onclick="openCreateTemplateSheet()"><svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Save Today's Tasks as Template</button>`;
  openSheet('Templates',body);
}
async function applyTemplate(tplId){
  const tpl=state.templates.find(t=>t.id===tplId); if(!tpl) return;
  const today=todayStr();
  const refs=await Promise.all((tpl.tasks||[]).map(t=>db.collection('tasks').add({user_id:currentUser.uid,title:t.title,notes:t.notes||'',category:t.category||'routine',date:today,status:'todo',completed:false,completed_at:null,created_at:Date.now()})));
  refs.forEach((ref,i)=>{ const t=tpl.tasks[i]; state.tasks.push(normTask({id:ref.id,user_id:currentUser.uid,title:t.title,notes:t.notes||'',category:t.category||'routine',date:today,status:'todo',completed:false,completed_at:null,created_at:Date.now()})); });
  closeSheet(); renderToday(); updateNavDots(); toast(`${refs.length} tasks added from "${tpl.name}"`);
}
async function applySingleTask(tplId,idx){
  const tpl=state.templates.find(t=>t.id===tplId); if(!tpl) return;
  const t=(tpl.tasks||[])[idx]; if(!t) return;
  const today=todayStr();
  const ref=await db.collection('tasks').add({user_id:currentUser.uid,title:t.title,notes:t.notes||'',category:t.category||'routine',date:today,status:'todo',completed:false,completed_at:null,created_at:Date.now()});
  state.tasks.push(normTask({id:ref.id,user_id:currentUser.uid,title:t.title,notes:t.notes||'',category:t.category||'routine',date:today,status:'todo',completed:false,completed_at:null,created_at:Date.now()}));
  renderToday(); updateNavDots(); toast(`"${t.title}" added to today`);
}
function openCreateTemplateSheet(){
  const today=todayStr(), todayTasks=state.tasks.filter(t=>t.date===today);
  let body=`<div class="field"><label>Template Name</label><input type="text" id="tplNameInput" class="add-field" placeholder="e.g. Morning Routine, Opening Shift…"></div>
  <div style="margin:12px 0 8px;font-size:12px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.6px">Today's Tasks (${todayTasks.length})</div>`;
  if(!todayTasks.length) body+='<div style="font-size:13px;color:var(--ink-4);text-align:center;padding:16px 0">No tasks today to save</div>';
  else body+=todayTasks.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)">
    <input type="checkbox" class="tpl-task-chk" data-id="${t.id}" checked style="width:16px;height:16px;accent-color:var(--accent)">
    <span style="flex:1;font-size:13px;color:var(--ink-2)">${escHtml(t.title)}</span>
    <span style="font-size:11px;color:var(--ink-4)">${escHtml((CAT[t.category]||CAT.routine).label)}</span>
  </div>`).join('');
  body+=`<div class="btn-row" style="margin-top:16px"><button class="btn btn-outline" onclick="closeSheet()">Cancel</button><button class="btn btn-primary" onclick="saveTemplate()">Save Template</button></div>`;
  openSheet('New Template',body);
}
async function saveTemplate(){
  const name=(document.getElementById('tplNameInput')||{}).value||'';
  if(!name.trim()){ toast('Enter a template name'); return; }
  const today=todayStr();
  const checked=[...document.querySelectorAll('.tpl-task-chk:checked')].map(el=>el.dataset.id);
  const tasks=state.tasks.filter(t=>t.date===today&&checked.includes(t.id)).map(t=>({title:t.title,category:t.category,notes:t.notes||''}));
  if(!tasks.length){ toast('Select at least one task'); return; }
  const ref=await db.collection('templates').add({user_id:currentUser.uid,name:name.trim(),tasks,created_at:Date.now()});
  state.templates.push({id:ref.id,user_id:currentUser.uid,name:name.trim(),tasks,created_at:Date.now()});
  closeSheet(); toast(`Template "${name.trim()}" saved!`);
}
async function deleteTemplate(tplId){
  state.templates=state.templates.filter(t=>t.id!==tplId);
  await db.collection('templates').doc(tplId).delete();
  toast('Template deleted'); openTemplatesSheet();
}

function openCatManager(){ closeSheet(); setTimeout(renderCatSheet,200); }
function renderCatSheet(){
  let body='<div class="card-title">Default Categories</div>';
  body+=Object.entries(DEFAULT_CAT).map(([k,v])=>`<div class="cat-item">
    <span class="cat-preview" style="background:${v.bg};color:${v.text}"><span style="width:8px;height:8px;border-radius:50%;background:${v.color};display:inline-block;flex-shrink:0"></span>${escHtml(v.label)}</span>
    <span style="font-size:12px;color:var(--ink-4)">Default</span>
  </div>`).join('');
  body+=customCategories.map(c=>{
    const p=COLOR_PRESETS[c.colorIdx]||COLOR_PRESETS[0];
    const inUse=state.tasks.some(t=>t.category===c.id);
    return`<div class="cat-item">
      <span class="cat-preview" style="background:${p.bg};color:${p.text}"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>${escHtml(c.emoji+' '+c.name)}</span>
      <button class="cat-del" ${inUse?'disabled title="Used by existing tasks"':''} onclick="deleteCustomCategory('${c.id}')">Delete</button>
    </div>`;
  }).join('');
  body+=`<hr class="divider"><div class="card-title">Add Custom Category</div>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <input type="text" id="newCatEmoji" class="add-field" placeholder="🎯" style="width:60px;text-align:center">
    <input type="text" id="newCatName" class="add-field" placeholder="Category name" style="flex:1">
  </div>
  <div class="swatch-row" style="margin-bottom:12px">${COLOR_PRESETS.map((p,i)=>`<div class="color-swatch${i===selectedColorIdx?' selected':''}" style="background:${p.color}" onclick="selectColor(${i})"></div>`).join('')}</div>
  <button class="btn btn-primary btn-full" onclick="addCustomCategory()">Add Category</button>`;
  openSheet('Categories',body);
}
function selectColor(idx){ selectedColorIdx=idx; document.querySelectorAll('.color-swatch').forEach((el,i)=>el.classList.toggle('selected',i===idx)); }
async function addCustomCategory(){
  const emoji=document.getElementById('newCatEmoji').value.trim()||'🏷';
  const name=document.getElementById('newCatName').value.trim();
  if(!name){ toast('Enter a category name'); return; }
  const id='custom_'+Date.now();
  customCategories.push({id,emoji,name,colorIdx:selectedColorIdx});
  rebuildCAT(); populateCatSelects();
  await db.collection('user_settings').doc(currentUser.uid).set({custom_categories:customCategories},{merge:true});
  renderCatSheet(); toast('Category added!');
}
async function deleteCustomCategory(id){
  customCategories=customCategories.filter(c=>c.id!==id);
  rebuildCAT(); populateCatSelects();
  await db.collection('user_settings').doc(currentUser.uid).set({custom_categories:customCategories},{merge:true});
  renderCatSheet(); toast('Category deleted');
}

function openSettingsSheet(){
  const accent=localStorage.getItem('st_accent')||'#4F46E5';
  openSheet('Settings',`
    <div style="font-size:13px;color:var(--ink-4);margin-bottom:16px">${escHtml(currentUser?.email||'')}</div>
    <button class="btn btn-outline btn-full" style="margin-bottom:10px" onclick="openCatManager()"><svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg> Categories</button>
    <button class="btn btn-outline btn-full" style="margin-bottom:10px" onclick="closeSheet();setTimeout(openTemplatesSheet,200)"><svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg> Templates</button>
    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Accent Color</div>
      <div class="accent-swatches">${ACCENT_COLORS.map(c=>`<div class="accent-swatch${accent===c?' selected':''}" style="background:${c}" onclick="tintAccent('${c}');document.querySelectorAll('.accent-swatch').forEach(e=>e.classList.remove('selected'));this.classList.add('selected')"></div>`).join('')}</div>
    </div>
    <hr class="divider">
    <button class="btn btn-danger btn-full" onclick="doSignOut()">Sign Out</button>`);
}

applyTheme();
applyAccent();
auth.onAuthStateChanged(async user=>{
  if(user&&!appInitialized){
    appInitialized=true; currentUser=user;
    try{ await loadData(); }catch(e){ console.error('loadData',e); }
    showApp();
  } else if(!user){
    appInitialized=false; showAuth();
  }
});
</script>
</body>
</html>
