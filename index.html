<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shift Tracker — Task Manager</title>
<meta name="theme-color" content="#4361ee">
<style>
  :root {
    --primary: #4361ee;
    --primary-light: #eef0fd;
    --success: #2ecc71;
    --success-light: #eafaf1;
    --warning: #f39c12;
    --warning-light: #fef9ec;
    --danger: #e74c3c;
    --danger-light: #fef0ef;
    --purple: #9b59b6;
    --purple-light: #f5eef8;
    --bg: #f0f2f8;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.18s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Header ───────────────────────────────── */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 20px 20px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header-date { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .shift-badge {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .shift-badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* ── Bottom Nav ───────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .nav-btn {
    flex: 1;
    padding: 10px 0 8px;
    border: none;
    background: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 500;
    transition: color var(--transition);
  }
  .nav-btn.active { color: var(--primary); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-icon { font-size: 22px; line-height: 1; }

  /* ── Views ────────────────────────────────── */
  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* ── Cards ────────────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* ── Shift Controls ───────────────────────── */
  .shift-controls { }
  .shift-timer {
    text-align: center;
    padding: 12px 0 8px;
  }
  .shift-timer .time-display {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--primary);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .shift-timer .time-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .shift-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px 0;
  }
  .shift-meta-item {
    text-align: center;
  }
  .shift-meta-item .val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .shift-meta-item .lbl {
    font-size: 11px;
    color: var(--text-muted);
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .btn {
    flex: 1;
    padding: 12px 10px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(67,97,238,0.35); }
  .btn-success { background: var(--success); color: #fff; box-shadow: 0 4px 14px rgba(46,204,113,0.35); }
  .btn-danger  { background: var(--danger);  color: #fff; box-shadow: 0 4px 14px rgba(231,76,60,0.35); }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--text);
  }
  .btn-sm { padding: 8px 12px; font-size: 13px; flex: unset; }

  /* ── Task Filter ──────────────────────────── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .filter-btn {
    padding: 7px 16px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    transition: all var(--transition);
  }
  .filter-btn.active {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  /* ── Task List ────────────────────────────── */
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .task-empty .emoji { font-size: 36px; display: block; margin-bottom: 8px; }

  .task-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: transform var(--transition);
    position: relative;
    overflow: hidden;
  }
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--cat-color, var(--primary));
    border-radius: 4px 0 0 4px;
  }
  .task-item.done { opacity: 0.65; }
  .task-item.done .task-title { text-decoration: line-through; color: var(--text-muted); }

  .task-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2.5px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    margin-top: 1px;
    background: #fff;
  }
  .task-check.checked {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }
  .task-check.checked::after {
    content: '✓';
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; font-weight: 500; line-height: 1.3; }
  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .cat-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--cat-bg, var(--primary-light));
    color: var(--cat-text, var(--primary));
  }
  .task-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 30px; height: 30px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--text-muted);
    transition: background var(--transition), color var(--transition);
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-light); color: var(--danger); }

  /* ── Add Task Form ────────────────────────── */
  .add-task-card { }
  .form-row { display: flex; flex-direction: column; gap: 10px; }
  .input-field, .select-field {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color var(--transition);
    font-family: inherit;
    -webkit-appearance: none;
  }
  .input-field:focus, .select-field:focus { border-color: var(--primary); }
  .row2 { display: flex; gap: 8px; }
  .row2 .select-field { flex: 1; }

  /* ── Calendar ─────────────────────────────── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-nav h2 { font-size: 18px; font-weight: 700; }
  .cal-nav-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
  }
  .cal-nav-btn:hover { border-color: var(--primary); color: var(--primary); }

  .cal-grid { }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .cal-wd {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    padding: 4px 0;
    text-transform: uppercase;
  }
  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    position: relative;
    transition: background var(--transition), color var(--transition);
    border: 2px solid transparent;
  }
  .cal-day:hover { background: var(--primary-light); }
  .cal-day.other-month { color: var(--border); cursor: default; }
  .cal-day.other-month:hover { background: none; }
  .cal-day.today { border-color: var(--primary); color: var(--primary); font-weight: 700; }
  .cal-day.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
  .cal-day.selected:hover { background: var(--primary); }

  .cal-dot-row {
    display: flex;
    gap: 2px;
    position: absolute;
    bottom: 4px;
  }
  .cal-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
  }
  .cal-dot.pending { background: var(--primary); }
  .cal-dot.done { background: var(--success); }

  .cal-day-detail {
    margin-top: 16px;
  }
  .cal-day-detail h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── Shift Summary Modal ──────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal {
    transform: translateY(0);
  }
  .modal-handle {
    width: 40px; height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 0 auto 20px;
  }
  .modal h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }
  .summary-stat {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .summary-stat:last-of-type { border-bottom: none; }
  .summary-stat .lbl { color: var(--text-muted); }
  .summary-stat .val { font-weight: 700; }
  .progress-bar-wrap {
    background: var(--bg);
    border-radius: 10px;
    height: 12px;
    margin: 12px 0 20px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--primary), var(--success));
    transition: width 0.6s ease;
  }

  /* ── Edit Modal ───────────────────────────── */
  .edit-modal { }
  .edit-modal h2 { margin-bottom: 16px; font-size: 18px; }

  /* ── Toast ────────────────────────────────── */
  .toast-container {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: #1a1a2e;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    animation: toast-in 0.25s ease, toast-out 0.25s ease 2.5s forwards;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* ── Section Divider ──────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    margin-top: 4px;
  }
  .section-header h3 {
    font-size: 16px;
    font-weight: 700;
  }
  .section-header .badge {
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 10px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
  }

  /* ── Check-in list ────────────────────────── */
  .checkin-list { list-style: none; }
  .checkin-list li {
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    color: var(--text-muted);
  }
  .checkin-list li:last-child { border-bottom: none; }
  .checkin-list .ci-time { font-weight: 600; color: var(--text); min-width: 60px; }

  /* ── Responsive cap ───────────────────────── */
  @media (min-width: 540px) {
    body { max-width: 540px; margin: 0 auto; }
    .header { border-radius: 0 0 20px 20px; }
    .bottom-nav { max-width: 540px; left: 50%; transform: translateX(-50%); }
    .toast-container { bottom: 96px; }
  }
</style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>Shift Tracker</h1>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div id="shiftBadgeWrap"></div>
  </div>
</div>

<!-- ── TODAY VIEW ─────────────────────────────── -->
<div class="view active" id="view-today">

  <!-- Shift Controls -->
  <div class="card shift-controls" id="shiftCard">
    <div class="card-title">Shift Controls</div>
    <div id="shiftIdle">
      <div style="text-align:center; padding: 8px 0 16px; color: var(--text-muted); font-size: 14px;">
        No active shift. Start one to begin tracking!
      </div>
      <button class="btn btn-primary" onclick="startShift()">▶ Start Shift</button>
    </div>
    <div id="shiftActive" style="display:none;">
      <div class="shift-timer">
        <div class="time-display" id="timerDisplay">00:00:00</div>
        <div class="time-label">shift duration</div>
      </div>
      <div class="shift-meta">
        <div class="shift-meta-item">
          <div class="val" id="metaCheckins">0</div>
          <div class="lbl">Check-ins</div>
        </div>
        <div class="shift-meta-item">
          <div class="val" id="metaDone">0</div>
          <div class="lbl">Done</div>
        </div>
        <div class="shift-meta-item">
          <div class="val" id="metaPending">0</div>
          <div class="lbl">Pending</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="checkIn()">📍 Check In</button>
        <button class="btn btn-danger" onclick="endShiftPrompt()">⏹ End Shift</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>

  <!-- Task List -->
  <div class="section-header">
    <h3>Today's Tasks</h3>
    <span class="badge" id="todayBadge">0</span>
  </div>
  <div class="task-list" id="todayTaskList"></div>

  <!-- Add Task -->
  <div class="card add-task-card" style="margin-top:14px;">
    <div class="card-title">Add Task</div>
    <div class="form-row">
      <input class="input-field" id="newTaskTitle" placeholder="What needs to be done?" maxlength="120"
             onkeydown="if(event.key==='Enter') addTask()">
      <div class="row2">
        <select class="select-field" id="newTaskCat">
          <option value="urgent">⚡ Urgent</option>
          <option value="routine" selected>🔄 Routine</option>
          <option value="followup">📋 Follow-up</option>
          <option value="deadline">🏁 Deadline</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="addTask()">+ Add</button>
      </div>
    </div>
  </div>
</div>

<!-- ── CALENDAR VIEW ───────────────────────────── -->
<div class="view" id="view-calendar">
  <div class="card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="moveMonth(-1)">‹</button>
      <h2 id="calMonthLabel"></h2>
      <button class="cal-nav-btn" onclick="moveMonth(1)">›</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-wd">Su</div><div class="cal-wd">Mo</div><div class="cal-wd">Tu</div>
      <div class="cal-wd">We</div><div class="cal-wd">Th</div><div class="cal-wd">Fr</div>
      <div class="cal-wd">Sa</div>
    </div>
    <div class="cal-days" id="calGrid"></div>
  </div>

  <div class="cal-day-detail card" id="calDayDetail"></div>
</div>

<!-- ── HISTORY VIEW ───────────────────────────── -->
<div class="view" id="view-history">
  <div id="historyList"></div>
</div>

<!-- ── BOTTOM NAV ─────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <span class="nav-icon">📋</span>Today
  </button>
  <button class="nav-btn" id="nav-calendar" onclick="switchView('calendar')">
    <span class="nav-icon">📅</span>Calendar
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <span class="nav-icon">📊</span>History
  </button>
</nav>

<!-- ── SHIFT SUMMARY MODAL ────────────────────── -->
<div class="modal-overlay" id="summaryOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Shift Summary 🏁</h2>
    <div id="summaryContent"></div>
    <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
      <button class="btn btn-success" id="rolloverBtn" style="display:none;" onclick="doRollover()">
        ↩ Rollover Missed Tasks to Tomorrow
      </button>
      <button class="btn btn-outline" onclick="closeSummary()">Close</button>
    </div>
  </div>
</div>

<!-- ── EDIT TASK MODAL ────────────────────────── -->
<div class="modal-overlay" id="editOverlay">
  <div class="modal edit-modal">
    <div class="modal-handle"></div>
    <h2>Edit Task</h2>
    <div class="form-row">
      <input class="input-field" id="editTitle" placeholder="Task title" maxlength="120">
      <select class="select-field" id="editCat">
        <option value="urgent">⚡ Urgent</option>
        <option value="routine">🔄 Routine</option>
        <option value="followup">📋 Follow-up</option>
        <option value="deadline">🏁 Deadline</option>
      </select>
      <select class="select-field" id="editDate"></select>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="closeEdit()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TOAST CONTAINER ────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════════════
//  STATE & STORAGE
// ═══════════════════════════════════════════════
const STORAGE_KEY = 'shifttrack_v2';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState();
  } catch { return defaultState(); }
}
function defaultState() {
  return { tasks: [], currentShift: null, shiftHistory: [] };
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let timerInterval = null;
let currentFilter = 'all';
let calendarMonth = { year: new Date().getFullYear(), month: new Date().getMonth() };
let selectedCalDate = todayStr();
let editingTaskId = null;

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function todayStr() {
  return dateToStr(new Date());
}
function dateToStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function strToDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate()+1);
  return dateToStr(d);
}
function formatTime(ms) {
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return [h,m,sec].map(v=>String(v).padStart(2,'0')).join(':');
}
function formatTimeOfDay(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}
const CAT = {
  urgent:   { label: '⚡ Urgent',    bg: '#fef0ef', text: '#e74c3c', color: '#e74c3c' },
  routine:  { label: '🔄 Routine',   bg: '#eef0fd', text: '#4361ee', color: '#4361ee' },
  followup: { label: '📋 Follow-up', bg: '#f5eef8', text: '#9b59b6', color: '#9b59b6' },
  deadline: { label: '🏁 Deadline',  bg: '#eafaf1', text: '#2ecc71', color: '#2ecc71' },
};

// ═══════════════════════════════════════════════
//  TASKS
// ═══════════════════════════════════════════════
function addTask() {
  const title = document.getElementById('newTaskTitle').value.trim();
  if (!title) { toast('Enter a task title'); return; }
  const cat = document.getElementById('newTaskCat').value;
  state.tasks.push({
    id: uid(),
    title,
    category: cat,
    date: todayStr(),
    completed: false,
    completedAt: null,
    createdAt: Date.now(),
  });
  document.getElementById('newTaskTitle').value = '';
  saveState();
  renderToday();
  toast('Task added');
}
function addTaskForDate(date) {
  const title = document.getElementById('calNewTitle').value.trim();
  if (!title) { toast('Enter a task title'); return; }
  const cat = document.getElementById('calNewCat').value;
  state.tasks.push({
    id: uid(), title, category: cat, date,
    completed: false, completedAt: null, createdAt: Date.now(),
  });
  document.getElementById('calNewTitle').value = '';
  saveState();
  renderCalDayDetail(date);
  renderCalendar();
  toast('Task added for ' + fmtDate(date));
}
function toggleTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (!t) return;
  t.completed = !t.completed;
  t.completedAt = t.completed ? Date.now() : null;
  saveState();
  renderToday();
  updateShiftMeta();
  if (t.completed) toast('✓ Task completed!');
}
function deleteTask(id) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  saveState();
  renderToday();
  renderCalendar();
  updateShiftMeta();
}
function openEdit(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (!t) return;
  editingTaskId = id;
  document.getElementById('editTitle').value = t.title;
  document.getElementById('editCat').value = t.category;
  const dateSelect = document.getElementById('editDate');
  dateSelect.innerHTML = '';
  const dates = generateDateOptions(t.date);
  dates.forEach(({value, label}) => {
    const opt = document.createElement('option');
    opt.value = value; opt.textContent = label;
    if (value === t.date) opt.selected = true;
    dateSelect.appendChild(opt);
  });
  document.getElementById('editOverlay').classList.add('open');
}
function generateDateOptions(currentDate) {
  const opts = [];
  const today = new Date();
  for (let i=-7; i<=30; i++) {
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    const val = dateToStr(d);
    let label = val;
    if (i === 0) label = 'Today (' + val + ')';
    else if (i === 1) label = 'Tomorrow (' + val + ')';
    else if (i === -1) label = 'Yesterday (' + val + ')';
    else label = d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'}) + ' (' + val + ')';
    opts.push({value: val, label});
  }
  if (!opts.find(o=>o.value===currentDate)) {
    opts.unshift({value:currentDate, label: currentDate});
  }
  return opts;
}
function saveEdit() {
  const t = state.tasks.find(t=>t.id===editingTaskId);
  if (!t) return;
  t.title = document.getElementById('editTitle').value.trim() || t.title;
  t.category = document.getElementById('editCat').value;
  t.date = document.getElementById('editDate').value;
  saveState();
  closeEdit();
  renderToday();
  renderCalendar();
  toast('Task updated');
}
function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
  editingTaskId = null;
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderToday();
}

// ═══════════════════════════════════════════════
//  RENDER TODAY
// ═══════════════════════════════════════════════
function renderToday() {
  const today = todayStr();
  let tasks = state.tasks.filter(t=>t.date===today);
  if (currentFilter==='pending') tasks = tasks.filter(t=>!t.completed);
  if (currentFilter==='done')    tasks = tasks.filter(t=>t.completed);

  const all = state.tasks.filter(t=>t.date===today);
  document.getElementById('todayBadge').textContent = all.length;

  const list = document.getElementById('todayTaskList');
  if (tasks.length === 0) {
    list.innerHTML = `<div class="task-empty"><span class="emoji">${currentFilter==='done'?'🎉':'📝'}</span>${
      currentFilter==='done' ? 'No completed tasks yet.' :
      currentFilter==='pending' ? 'All tasks done! 🎉' :
      'No tasks for today. Add one below!'
    }</div>`;
    return;
  }
  list.innerHTML = tasks.map(t=>taskHTML(t)).join('');
}
function taskHTML(t) {
  const cat = CAT[t.category] || CAT.routine;
  return `<div class="task-item ${t.completed?'done':''}"
              style="--cat-color:${cat.color}; --cat-bg:${cat.bg}; --cat-text:${cat.text};"
              id="task-${t.id}">
    <div class="task-check ${t.completed?'checked':''}" onclick="toggleTask('${t.id}')"></div>
    <div class="task-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="cat-badge" style="background:${cat.bg};color:${cat.text};">${cat.label}</span>
        ${t.completedAt ? `<span class="task-time">✓ ${formatTimeOfDay(t.completedAt)}</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="openEdit('${t.id}')" title="Edit">✏️</button>
      <button class="icon-btn danger" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button>
    </div>
  </div>`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
//  SHIFT MANAGEMENT
// ═══════════════════════════════════════════════
function startShift() {
  if (state.currentShift) return;
  const today = todayStr();
  const todayTasks = state.tasks.filter(t=>t.date===today);
  state.currentShift = {
    id: uid(),
    startTime: Date.now(),
    checkIns: [],
    taskSnapshot: todayTasks.map(t=>t.id),
  };
  saveState();
  renderShiftUI();
  startTimer();
  toast('Shift started! 🚀');
}
function checkIn() {
  if (!state.currentShift) return;
  const today = todayStr();
  const todayTasks = state.tasks.filter(t=>t.date===today);
  const done = todayTasks.filter(t=>t.completed).length;
  const total = todayTasks.length;
  const snapshot = `${done}/${total} tasks complete`;
  state.currentShift.checkIns.push({ ts: Date.now(), snapshot });
  saveState();
  updateShiftMeta();
  toast(`📍 Checked in: ${snapshot}`);
}
function endShiftPrompt() {
  if (!state.currentShift) return;
  showSummary(false);
}
function showSummary(readonly) {
  const shift = state.currentShift;
  const today = todayStr();
  const todayTasks = state.tasks.filter(t=>t.date===today);
  const done = todayTasks.filter(t=>t.completed);
  const pending = todayTasks.filter(t=>!t.completed);
  const duration = Date.now() - shift.startTime;
  const pct = todayTasks.length ? Math.round((done.length/todayTasks.length)*100) : 0;

  document.getElementById('summaryContent').innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="summary-stat"><span class="lbl">% Complete</span><span class="val">${pct}%</span></div>
    <div class="summary-stat"><span class="lbl">Tasks Done</span><span class="val">${done.length}</span></div>
    <div class="summary-stat"><span class="lbl">Tasks Missed</span><span class="val">${pending.length}</span></div>
    <div class="summary-stat"><span class="lbl">Check-ins</span><span class="val">${shift.checkIns.length}</span></div>
    <div class="summary-stat"><span class="lbl">Total Duration</span><span class="val">${formatTime(duration)}</span></div>
    <div class="summary-stat"><span class="lbl">Started</span><span class="val">${formatTimeOfDay(shift.startTime)}</span></div>
    ${shift.checkIns.length ? `
    <div style="margin-top:14px;"><div class="card-title">Check-in Log</div>
    <ul class="checkin-list">${shift.checkIns.map(ci=>`
      <li><span class="ci-time">${formatTimeOfDay(ci.ts)}</span><span>${ci.snapshot}</span></li>`).join('')}
    </ul></div>` : ''}
    ${pending.length ? `
    <div style="margin-top:14px;"><div class="card-title">Missed Tasks</div>
    <ul class="checkin-list">${pending.map(t=>`<li><span>${escHtml(t.title)}</span></li>`).join('')}
    </ul></div>` : ''}
  `;

  const rollBtn = document.getElementById('rolloverBtn');
  rollBtn.style.display = (pending.length && !readonly) ? '' : 'none';

  if (!readonly) {
    finishShift(shift, duration, done.length, pending.length, pct);
  }

  document.getElementById('summaryOverlay').classList.add('open');
}
function finishShift(shift, duration, doneCount, missedCount, pct) {
  state.shiftHistory.push({
    ...shift,
    endTime: Date.now(),
    duration,
    doneCount,
    missedCount,
    pct,
    date: todayStr(),
  });
  state.currentShift = null;
  saveState();
  stopTimer();
  renderShiftUI();
}
function doRollover() {
  const tomorrow = tomorrowStr();
  const today = todayStr();
  const missed = state.tasks.filter(t=>t.date===today && !t.completed);
  missed.forEach(t => {
    state.tasks.push({
      ...t,
      id: uid(),
      date: tomorrow,
      completed: false,
      completedAt: null,
      createdAt: Date.now(),
    });
  });
  saveState();
  closeSummary();
  toast(`↩ ${missed.length} task${missed.length!==1?'s':''} rolled over to tomorrow!`);
  renderCalendar();
}
function closeSummary() {
  document.getElementById('summaryOverlay').classList.remove('open');
}
function renderShiftUI() {
  const active = !!state.currentShift;
  document.getElementById('shiftIdle').style.display = active ? 'none' : '';
  document.getElementById('shiftActive').style.display = active ? '' : 'none';
  const wrap = document.getElementById('shiftBadgeWrap');
  if (active) {
    wrap.innerHTML = `<div class="shift-badge"><div class="dot"></div>ON SHIFT</div>`;
  } else {
    wrap.innerHTML = '';
  }
  if (active) updateShiftMeta();
}
function updateShiftMeta() {
  if (!state.currentShift) return;
  const today = todayStr();
  const tasks = state.tasks.filter(t=>t.date===today);
  document.getElementById('metaCheckins').textContent = state.currentShift.checkIns.length;
  document.getElementById('metaDone').textContent = tasks.filter(t=>t.completed).length;
  document.getElementById('metaPending').textContent = tasks.filter(t=>!t.completed).length;
}
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!state.currentShift) { clearInterval(timerInterval); return; }
    const elapsed = Date.now() - state.currentShift.startTime;
    document.getElementById('timerDisplay').textContent = formatTime(elapsed);
  }, 1000);
}
function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  const el = document.getElementById('timerDisplay');
  if (el) el.textContent = '00:00:00';
}

// ═══════════════════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════════════════
function moveMonth(delta) {
  calendarMonth.month += delta;
  if (calendarMonth.month > 11) { calendarMonth.month = 0; calendarMonth.year++; }
  if (calendarMonth.month < 0)  { calendarMonth.month = 11; calendarMonth.year--; }
  renderCalendar();
}
function renderCalendar() {
  const { year, month } = calendarMonth;
  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = `${monthNames[month]} ${year}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();
  const todayDate = todayStr();

  const cells = [];
  // prev month overflow
  for (let i=firstDay-1; i>=0; i--) {
    const d = new Date(year, month-1, daysInPrev-i);
    cells.push({date: dateToStr(d), day: daysInPrev-i, other: true});
  }
  // current month
  for (let d=1; d<=daysInMonth; d++) {
    cells.push({date: dateToStr(new Date(year,month,d)), day: d, other: false});
  }
  // next month overflow
  let next = 1;
  while (cells.length % 7 !== 0 || cells.length < 35) {
    const d = new Date(year, month+1, next++);
    cells.push({date: dateToStr(d), day: next-1, other: true});
    if (cells.length >= 42) break;
  }

  const grid = document.getElementById('calGrid');
  grid.innerHTML = cells.map(({date, day, other}) => {
    const tasks = state.tasks.filter(t=>t.date===date);
    const hasPending = tasks.some(t=>!t.completed);
    const hasDone    = tasks.some(t=>t.completed);
    const allDone    = tasks.length > 0 && !hasPending;
    const isToday    = date===todayDate;
    const isSelected = date===selectedCalDate;
    const dots = [];
    if (allDone)        dots.push('<div class="cal-dot done"></div>');
    else if (hasPending) dots.push('<div class="cal-dot pending"></div>');
    else if (hasDone)   dots.push('<div class="cal-dot done"></div>');

    return `<div class="cal-day ${other?'other-month':''} ${isToday?'today':''} ${isSelected?'selected':''}"
                 onclick="${other?'':'selectCalDay(\''+date+'\')'}" data-date="${date}">
      ${day}
      ${dots.length ? `<div class="cal-dot-row">${dots.join('')}</div>` : ''}
    </div>`;
  }).join('');

  renderCalDayDetail(selectedCalDate);
}
function selectCalDay(date) {
  selectedCalDate = date;
  renderCalendar();
}
function fmtDate(dateStr) {
  const d = strToDate(dateStr);
  return d.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
}
function renderCalDayDetail(date) {
  const tasks = state.tasks.filter(t=>t.date===date);
  const today = todayStr();
  const isToday = date === today;
  const el = document.getElementById('calDayDetail');

  let tasksHtml = '';
  if (tasks.length === 0) {
    tasksHtml = `<div class="task-empty" style="padding:16px 0 8px;"><span class="emoji">📅</span>No tasks for this day.</div>`;
  } else {
    tasksHtml = `<div class="task-list">${tasks.map(t=>calTaskHTML(t)).join('')}</div>`;
  }

  const copyBtn = !isToday && tasks.length > 0
    ? `<button class="btn btn-outline btn-sm" style="font-size:12px;" onclick="copyToToday('${date}')">📋 Copy all to Today</button>`
    : '';

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap;">
      <div>
        <div style="font-size:16px;font-weight:700;">${fmtDate(date)}</div>
        <div style="font-size:12px;color:var(--text-muted);">${tasks.length} task${tasks.length!==1?'s':''}</div>
      </div>
      ${copyBtn}
    </div>
    ${tasksHtml}
    <div class="form-row" style="margin-top:14px;">
      <input class="input-field" id="calNewTitle" placeholder="Add task for this day…" maxlength="120"
             onkeydown="if(event.key==='Enter') addTaskForDate('${date}')">
      <div class="row2">
        <select class="select-field" id="calNewCat">
          <option value="urgent">⚡ Urgent</option>
          <option value="routine" selected>🔄 Routine</option>
          <option value="followup">📋 Follow-up</option>
          <option value="deadline">🏁 Deadline</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="addTaskForDate('${date}')">+ Add</button>
      </div>
    </div>`;
}
function calTaskHTML(t) {
  const cat = CAT[t.category] || CAT.routine;
  return `<div class="task-item ${t.completed?'done':''}"
              style="--cat-color:${cat.color}; margin-bottom:8px;">
    <div class="task-check ${t.completed?'checked':''}" onclick="toggleCalTask('${t.id}')"></div>
    <div class="task-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="cat-badge" style="background:${cat.bg};color:${cat.text};">${cat.label}</span>
        ${t.completedAt ? `<span class="task-time">✓ ${formatTimeOfDay(t.completedAt)}</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="openEdit('${t.id}')">✏️</button>
      <button class="icon-btn danger" onclick="deleteCalTask('${t.id}', '${t.date}')">🗑️</button>
    </div>
  </div>`;
}
function toggleCalTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (!t) return;
  t.completed = !t.completed;
  t.completedAt = t.completed ? Date.now() : null;
  saveState();
  renderCalDayDetail(selectedCalDate);
  renderCalendar();
  if (t.date === todayStr()) { renderToday(); updateShiftMeta(); }
}
function deleteCalTask(id, date) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  saveState();
  renderCalDayDetail(date);
  renderCalendar();
  if (date === todayStr()) renderToday();
}
function copyToToday(fromDate) {
  const today = todayStr();
  const src = state.tasks.filter(t=>t.date===fromDate);
  src.forEach(t => {
    state.tasks.push({
      ...t,
      id: uid(),
      date: today,
      completed: false,
      completedAt: null,
      createdAt: Date.now(),
    });
  });
  saveState();
  renderToday();
  renderCalendar();
  toast(`📋 Copied ${src.length} task${src.length!==1?'s':''} to today!`);
}

// ═══════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════
function renderHistory() {

  }

    return `<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div>

          <div style="font-size:12px;color:var(--text-muted);">${formatTimeOfDay(sh.startTime)} – ${sh.endTime?formatTimeOfDay(sh.endTime):'?'}</div>

        <span style="font-size:13px;color:var(--text-muted);">✅ ${sh.doneCount||0} done</span>

function init() {
  updateHeaderDate();
  renderToday();
  renderShiftUI();
  if (state.currentShift) startTimer();

  // update header date at midnight
  const now = new Date();
  const msUntilMidnight = (new Date(now.getFullYear(),now.getMonth(),now.getDate()+1) - now);
  setTimeout(() => { updateHeaderDate(); renderToday(); }, msUntilMidnight);
